<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>StreamNova – Watch Videos, Stream Music & Podcasts Online</title>
  <meta name="description" content="StreamNova is a fast modern streaming web app to watch videos, stream music and listen to podcasts online. Built with React for smooth performance." />
  <meta name="keywords" content="video streaming app, music streaming web app, podcast player online, media streaming platform, React media app" />
  <meta name="author" content="Sudhir (SudhirDevOps1)" />
  <meta name="robots" content="index, follow, max-image-preview:large" />
  <link rel="canonical" href="https://stream-nova-eight.vercel.app/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="StreamNova – Modern Streaming Platform" />
  <meta property="og:description" content="All-in-one streaming platform for videos, music and podcasts." />
  <meta property="og:url" content="https://stream-nova-eight.vercel.app/" />
  <meta property="og:site_name" content="StreamNova" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="StreamNova – Stream Media Online" />
  <meta name="twitter:description" content="Fast and responsive React streaming platform built by SudhirDevOps1." />

  <!-- Theme Color -->
  <meta name="theme-color" content="#0f172a" />

  <!-- Performance Optimizations -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://www.youtube.com" crossorigin />

  <!-- Reduce font weights (performance) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Defer YouTube API to avoid blocking render -->
  <script defer src="https://www.youtube.com/iframe_api"></script>

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "StreamNova",
    "url": "https://stream-nova-eight.vercel.app/",
    "applicationCategory": "EntertainmentApplication",
    "operatingSystem": "Web",
    "creator": {
      "@type": "Person",
      "name": "Sudhir",
      "url": "https://github.com/SudhirDevOps1"
    },
    "description": "Modern streaming platform for watching videos, listening to music and podcasts."
  }
  </script>

</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
